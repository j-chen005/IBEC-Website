// ── Math helpers ──────────────────────────────────────────
function project(lat, lon, rot, r) {
  const latR = lat * Math.PI / 180;
  const lonR = (lon + rot * 180 / Math.PI) * Math.PI / 180;
  return {
    x: r * Math.cos(latR) * Math.sin(lonR),
    y: r * Math.sin(latR) * -1,
    z: r * Math.cos(latR) * Math.cos(lonR),
  };
}
const easeOutCubic   = x => 1 - Math.pow(1 - x, 3);
const easeInOutCubic = x => x < 0.5 ? 4*x*x*x : 1 - Math.pow(-2*x+2,3)/2;
const clamp01        = x => Math.max(0, Math.min(1, x));
const range          = (t, a, b) => clamp01((t - a) / (b - a));

}

function TickerBar() {
  const [items, setItems] = React.useState(TICKER_ITEMS);

  React.useEffect(() => {
    const fmt = (n) => n >= 1000 ? n.toLocaleString("en-US", { maximumFractionDigits: 0 }) : n.toFixed(2);
    const fetchAll = async () => {
      try {
        const results = await Promise.allSettled(
          YF_SYMBOLS.map(({ sym, yf }) =>
            fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${yf}?interval=1d&range=1d`)
              .then(r => r.json())
              .then(data => {
                const q = data?.chart?.result?.[0];
                if (!q) return null;
                const meta = q.meta;
                const price = meta.regularMarketPrice;
                const prev  = meta.previousClose || meta.chartPreviousClose;
                const chAbs = price - prev;
                const chPct = (chAbs / prev) * 100;
                return {
                  sym,
                  val: sym === "UST 10Y" ? price.toFixed(2) + "%" : fmt(price),
                  ch:  (chPct >= 0 ? "+" : "") + chPct.toFixed(2) + "%",
                  dir: chPct >= 0 ? "up" : "dn",
                };
              })
          )
        );
        const live = results
          .filter(r => r.status === "fulfilled" && r.value)
          .map(r => r.value);
        if (live.length > 0) {
          // Merge live data with static items (keep WIBEC NAV + alpha as-is)
          setItems(prev => {
            const map = Object.fromEntries(live.map(l => [l.sym, l]));
            return prev.map(p => map[p.sym] || p);
          });
        }
      } catch (_) {}
    };
    fetchAll();
    const interval = setInterval(fetchAll, 60000);
    return () => clearInterval(interval);
  }, []);

  const row = k => items.map((t, i) => (
    <span key={`${k}-${i}`} className="ticker-chip">
      <strong>{t.sym}</strong>
      <span style={{ opacity: 0.9 }}>{t.val}</span>
      <span className={t.dir === "up" ? "up" : "dn"}>{t.dir === "up" ? "▲" : "▼"}{t.ch}</span>
    </span>
  ));
  return (
    <div className="ticker-wrap" style={{ background: "#071428", borderColor: "rgba(0,212,255,0.12)" }}>
      <div className="ticker">{row("a")}{row("b")}</div>
    </div>
  );
}

// ── Globe Hero ────────────────────────────────────────────
const HERO_VH = 260;

function Hero() {
  const [progress, setProgress] = React.useState(1);
  const [ambient, setAmbient]   = React.useState(0);
  const [hoverId, setHoverId]   = React.useState(null);
  const [vh, setVh] = React.useState(window.innerHeight);
  const [vw, setVw] = React.useState(window.innerWidth);
  const wrapRef = React.useRef(null);
  const prevAmbientRef = React.useRef(0);
  const rotAccRef      = React.useRef(0);
  const [mounted, setMounted] = React.useState(false);
  React.useEffect(() => {
    const t = setTimeout(() => setMounted(true), 80);
    return () => clearTimeout(t);
  }, []);

  React.useEffect(() => {
    const compute = () => {
      const el = wrapRef.current;
      if (!el) return;
      const travel = el.offsetHeight - window.innerHeight;
      const scrolled = Math.max(0, -el.getBoundingClientRect().top);
      setProgress(clamp01(scrolled / travel));
    };
    const onResize = () => { setVh(window.innerHeight); setVw(window.innerWidth); compute(); };
    compute();
    window.addEventListener("scroll", compute, { passive: true });
    window.addEventListener("resize", onResize);

    let snapping = false;
    let snapRaf = null;
    let cooldown = false;
    let springTarget = 0;
    let springVel = 0;
    let springLast = 0;
    let springDir = 1;
    const OMEGA = 3.2;
    const endSpring = () => {
      window.scrollTo(0, springTarget);
      snapRaf = null;
      snapping = false;
      cooldown = true;
      setTimeout(() => { cooldown = false; }, 500);
    };
    const runSpring = () => {
      const now = performance.now();
      const dt = Math.min(0.05, (now - springLast) / 1000);
      springLast = now;
      const x = window.scrollY;
      const a = -2 * OMEGA * springVel - OMEGA * OMEGA * (x - springTarget);
      springVel += a * dt;
      const nx = x + springVel * dt;
      // hard-stop as soon as we cross the target in the direction of travel — no overshoot/pullback
      if ((springDir > 0 && nx >= springTarget) || (springDir < 0 && nx <= springTarget)) {
        endSpring(); return;
      }
      if (Math.abs(nx - springTarget) < 0.5 && Math.abs(springVel) < 3) {
        endSpring(); return;
      }
      window.scrollTo(0, nx);
      snapRaf = requestAnimationFrame(runSpring);
    };
    const onWheel = (e) => {
      const el = wrapRef.current;
      if (!el || cooldown) return;
      const travel = el.offsetHeight - window.innerHeight;
      const scrolled = -el.getBoundingClientRect().top;
      if (scrolled <= 8 || scrolled >= travel - 8) return;
      const prog = clamp01(scrolled / travel);
      if (prog <= 0.01 || prog >= 0.98) return;
      e.preventDefault();
      // convert deltaY to velocity (px/sec). Clamp so a flick doesn't overshoot absurdly.
      const inputVel = Math.sign(e.deltaY) * Math.min(Math.abs(e.deltaY) * 55, 9000);
      const target = e.deltaY > 0 ? el.offsetTop + travel : el.offsetTop;
      if (!snapping) {
        springTarget = target;
        springVel = inputVel;
        springDir = e.deltaY > 0 ? 1 : -1;
        springLast = performance.now();
        snapping = true;
        snapRaf = requestAnimationFrame(runSpring);
      } else if (Math.sign(e.deltaY) === springDir) {
        // same-direction boost only — opposite-direction wheels are ignored to avoid tug-of-war
        springVel += inputVel * 0.35;
      }
    };
    window.addEventListener("wheel", onWheel, { passive: false });

    return () => {
      window.removeEventListener("scroll", compute);
      window.removeEventListener("resize", onResize);
      window.removeEventListener("wheel", onWheel);
    };
  }, []);

  React.useEffect(() => {
    let raf;
    const tick = now => { setAmbient(now / 1000); raf = requestAnimationFrame(tick); };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, []);

  const pZoom   = easeInOutCubic(range(progress, 0.05, 0.70));
  const pHead1  = easeOutCubic(range(progress, 0.72, 0.82));
  const pHead2  = easeOutCubic(range(progress, 0.78, 0.88));
  const pHead3  = easeOutCubic(range(progress, 0.84, 0.94));
  const pPara   = range(progress, 0.86, 0.96);
  const pBtns   = range(progress, 0.90, 1.00);
  const pRoster = range(progress, 0.94, 1.00);
  const pLabels = range(progress, 0.82, 1.00);
  const pDraw   = range(progress, 0.75, 1.00);
  const pFig    = range(progress, 0.94, 1.00);

  const rotRate = 0.225 + (0.02 - 0.225) * pZoom;
  const dAmbient = ambient - prevAmbientRef.current;
  prevAmbientRef.current = ambient;
  rotAccRef.current += dAmbient * rotRate;
  const rot = rotAccRef.current;
  const R = 240, vbSize = 680;

  const dockedCx = vw * 0.72, dockedCy = vh * 0.52;
  const introScale = 2.8, dockedScale = 1.0;
  const introCx = vw * 0.50;
  const introCy = vh * 0.55 + R * introScale;

  const cx = introCx + (dockedCx - introCx) * pZoom;
  const cy = introCy + (dockedCy - introCy) * pZoom;
  const scale = introScale + (dockedScale - introScale) * pZoom;

  const meridians = [];
  for (let lon = -180; lon < 180; lon += 20) {
    const pts = [];
    for (let lat = -90; lat <= 90; lat += 6) pts.push(project(lat, lon, rot, R));
    meridians.push(pts);
  }
  const parallels = [];
  for (let lat = -60; lat <= 60; lat += 20) {
    const pts = [];
    for (let lon = -180; lon <= 180; lon += 6) pts.push(project(lat, lon, rot, R));
    parallels.push(pts);
  }
  const regions = REGIONS.map((r, i) => ({ ...r, idx: i, proj: project(r.lat, r.lon, rot, R) }));

  const pingOf = i => {
    if (progress < 0.98) return { r: 0, o: 0 };
    const phase = ((ambient - i * 0.7) % 5) / 5;
    if (phase < 0 || phase > 0.6) return { r: 0, o: 0 };
    return { r: phase * 80, o: (1 - phase / 0.6) * 0.5 };
  };
  const focused = hoverId ? regions.find(r => r.id === hoverId) : null;

  return (
    <section ref={wrapRef} style={{
      position: "relative", height: `${HERO_VH}vh`,
      background: "var(--paper)", borderBottom: "1px solid var(--rule)", padding: 0,
    }}>
      <div style={{ position: "sticky", top: 0, height: "100vh", overflow: "hidden" }}>

        {/* Giant WIBEC rising from the globe — only visible at intro, fades out as hijack begins */}
        {pZoom < 0.35 && (
          <div style={{
            position: "absolute", inset: 0, zIndex: 0,
            display: "flex", alignItems: "center", justifyContent: "center",
            paddingBottom: "4vh",
            pointerEvents: "none",
            opacity: (mounted ? 1 : 0) * (1 - Math.min(1, pZoom / 0.25)),
            transform: `translateY(${pZoom * 60 + (mounted ? 0 : 180)}px)`,
            transition: "opacity 6400ms cubic-bezier(0.22,1,0.36,1), transform 6400ms cubic-bezier(0.22,1,0.36,1)",
            WebkitMaskImage: "linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0.85) 20%, rgba(0,0,0,0.35) 45%, rgba(0,0,0,0.05) 68%, rgba(0,0,0,0) 82%)",
            maskImage: "linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0.85) 20%, rgba(0,0,0,0.35) 45%, rgba(0,0,0,0.05) 68%, rgba(0,0,0,0) 82%)",
          }}>
            <span style={{
              fontFamily: '"Inter Tight", ui-sans-serif, system-ui, sans-serif',
              fontSize: "clamp(140px, 20vw, 360px)",
              fontWeight: 700,
              letterSpacing: "-0.055em",
              lineHeight: 0.9,
              color: "rgba(234,241,255,0.95)",
              textShadow: "0 8px 40px rgba(0,212,255,0.12)",
            }}>WIBEC</span>
          </div>
        )}

        {/* Globe */}
        <div style={{ position: "absolute", inset: 0, pointerEvents: "none", zIndex: 1 }}>
          <svg viewBox={`-${vbSize/2} -${vbSize/2} ${vbSize} ${vbSize}`} style={{
            position: "absolute", left: cx - vbSize/2, top: cy - vbSize/2,
            width: vbSize, height: vbSize,
            transform: `scale(${scale})`, transformOrigin: "50% 50%",
            overflow: "visible", willChange: "transform, left, top",
          }}>
            <defs>
              <radialGradient id="gFlash" cx="50%" cy="50%" r="50%">
                <stop offset="0%"   stopColor="var(--coral)" stopOpacity="0.5"/>
                <stop offset="60%"  stopColor="var(--coral)" stopOpacity="0.05"/>
                <stop offset="100%" stopColor="var(--coral)" stopOpacity="0"/>
              </radialGradient>
            </defs>
            <circle cx="0" cy="0" r={R*1.6} fill="url(#gFlash)" opacity={(1-pZoom)*0.22}/>
            <circle cx="0" cy="0" r={R}     fill="none" stroke="var(--ink-900)" strokeWidth="1"   opacity="0.18"/>
            <circle cx="0" cy="0" r={R-6}   fill="none" stroke="var(--ink-900)" strokeWidth="0.4" opacity="0.08"/>
            {parallels.map((line,i) => (
              <polyline key={`par-${i}`} fill="none" stroke="var(--ink-700)"
                strokeWidth="0.6" opacity="0.22"
                points={line.map(p=>`${p.x},${p.y}`).join(" ")}/>
            ))}
            {meridians.map((line,i) => {
              const segs = []; let cur = [];
              for (const p of line) {
                if (p.z > -30) cur.push(p);
                else if (cur.length > 1) { segs.push(cur); cur = []; }
              }
              if (cur.length > 1) segs.push(cur);
              return segs.map((seg,j) => (
                <polyline key={`mer-${i}-${j}`} fill="none" stroke="var(--ink-700)" strokeWidth="0.6"
                  opacity={0.22*(seg[Math.floor(seg.length/2)].z+30)/(R+30)}
                  points={seg.map(p=>`${p.x},${p.y}`).join(" ")}/>
              ));
            })}
            {regions.map((r,i) => regions.slice(i+1).map((s,j) => {
              if (r.proj.z < 0 || s.proj.z < 0 || pDraw <= 0) return null;
              const x2 = r.proj.x + (s.proj.x - r.proj.x)*pDraw;
              const y2 = r.proj.y + (s.proj.y - r.proj.y)*pDraw;
              return <line key={`conn-${i}-${j}`} x1={r.proj.x} y1={r.proj.y} x2={x2} y2={y2}
                stroke="var(--coral)" strokeWidth="0.5" opacity="0.22"/>;
            }))}
            {regions.map((r,i) => {
              const front = r.proj.z > 0;
              const revealP = easeOutCubic(range(progress, 0.55+i*0.01, 0.85+i*0.01));
              const alpha = Math.max(revealP, 1-pZoom);
              if (alpha <= 0) return null;
              const isFocus = focused && focused.id === r.id;
              const sz = (front ? 5 : 3) * alpha * (isFocus ? 1.6 : 1);
              const ping = pingOf(i);
              return (
                <g key={r.id} opacity={front ? 1 : 0.3}>
                  {ping.o > 0 && front && (
                    <circle cx={r.proj.x} cy={r.proj.y} r={ping.r} fill="none"
                      stroke="var(--coral)" strokeWidth="0.8" opacity={ping.o}/>
                  )}
                  {isFocus && <circle cx={r.proj.x} cy={r.proj.y} r={18} fill="var(--coral)" opacity="0.18"/>}
                  <circle cx={r.proj.x} cy={r.proj.y} r={sz+6} fill="var(--coral)" opacity="0.15"/>
                  <circle cx={r.proj.x} cy={r.proj.y} r={sz}   fill="var(--coral)"/>
                  {front && (pLabels > 0 || isFocus) && (
                    <g transform={`translate(${r.proj.x+12},${r.proj.y+4})`} opacity={isFocus ? 1 : pLabels}>
                      <text fontFamily="Space Grotesk" fontSize="10"
                        fill={isFocus ? "var(--coral-ink)" : "var(--ink-900)"} fontWeight="600">
                        {(r.mapName || r.name).toUpperCase()}
                      </text>
                      <text fontFamily="Space Grotesk" fontSize="9" fill="var(--coral-ink)" y="12">{r.ret}</text>
                    </g>
                  )}
                </g>
              );
            })}
          </svg>
        </div>

        {/* Text */}
        <div className="container-wide" style={{
          position: "absolute", inset: 0,
          display: "grid", gridTemplateColumns: "1.05fr 1fr", gap: 48,
          alignItems: "center", padding: "72px 32px 0", zIndex: 2, pointerEvents: "none",
        }}>
          <div style={{ position: "relative", maxWidth: 760, pointerEvents: "auto" }}>
            <h1 className="display" style={{ fontSize: "clamp(52px,7vw,112px)", margin: 0, letterSpacing: "-0.03em", lineHeight: 1.12, overflow: "visible" }}>

function CommitteesMap() {
  const [hover, setHover] = React.useState(null);
  const [worldPaths, setWorldPaths] = React.useState([]);
  const W=1000, H=500;
  const px = lon => ((lon+180)/360)*W;
  const py = lat => ((90-lat)/180)*H;

  React.useEffect(() => {
    fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json")
      .then(r => r.json())
      .then(world => {
        const countries = topojson.feature(world, world.objects.countries);
        const paths = countries.features.map(f => {
          const geom = f.geometry;
          const toPath = rings => rings.map(ring =>
            ring.map((c,i) => `${i===0?'M':'L'}${px(c[0]).toFixed(1)},${py(c[1]).toFixed(1)}`).join(' ') + 'Z'
          ).join(' ');
          let d = '';
          if (geom.type === 'Polygon') d = toPath(geom.coordinates);
          else if (geom.type === 'MultiPolygon') d = geom.coordinates.map(p => toPath(p)).join(' ');
          return d;
        });
        setWorldPaths(paths);
      })
      .catch(() => {});
  }, []);

  return (
    <section style={{ background:"#06122b", color:"#eaf1ff", padding:"120px 0" }}>
      <div className="container-wide">
        <div className="section-head" style={{ color:"#eaf1ff" }}>
          <div>
            <div className="n" style={{ color:"var(--coral)" }}>§ 02 — Coverage</div>
            <h2 style={{ color:"#eaf1ff" }}>Six regions, actively covered.</h2>
          </div>
          <p style={{ color:"rgba(234,241,255,0.7)" }}>Each committee runs its own research calendar, maintains a watchlist, and defends pitches at weekly investment committee. Apprentices rotate before specializing.</p>
        </div>
        <div style={{ position:"relative", border:"1px solid rgba(0,212,255,0.15)", padding:24, background:"rgba(0,10,32,0.6)", borderRadius:4 }}>
          <svg viewBox={`0 0 ${W} ${H}`} style={{ width:"100%", height:"auto", display:"block" }}>
            {/* Grid */}
            {[-60,-30,0,30,60].map(lat => <line key={lat} x1="0" x2={W} y1={py(lat)} y2={py(lat)} stroke="rgba(0,212,255,0.07)"/>)}
            {[-150,-120,-90,-60,-30,0,30,60,90,120,150].map(lon => <line key={lon} y1="0" y2={H} x1={px(lon)} x2={px(lon)} stroke="rgba(0,212,255,0.07)"/>)}
            <line x1="0" x2={W} y1={py(0)} y2={py(0)} stroke="rgba(0,212,255,0.22)" strokeDasharray="4 4"/>
            {/* Country fills */}
            {worldPaths.map((d,i) => d && (
              <path key={i} d={d} fill="rgba(0,212,255,0.08)" stroke="rgba(0,212,255,0.22)" strokeWidth="0.5"/>
            ))}
            {/* Region markers */}
            {REGIONS.map(r => {
              const active = hover===r.id;
              return (
                <g key={r.id} onMouseEnter={()=>setHover(r.id)} onMouseLeave={()=>setHover(null)} style={{ cursor:"pointer" }}>
                  <circle cx={px(r.lon)} cy={py(r.lat)} r={active?40:28} fill="var(--coral)" opacity={active?0.2:0.1}/>
                  <circle cx={px(r.lon)} cy={py(r.lat)} r={active?14:10} fill="var(--coral)" opacity={active?0.4:0.2}/>
                  <circle cx={px(r.lon)} cy={py(r.lat)} r="4.5" fill="var(--coral)"/>
                  <line x1={px(r.lon)} y1={py(r.lat)} x2={px(r.lon)+38} y2={py(r.lat)-38} stroke="rgba(0,212,255,0.4)" strokeWidth="0.7"/>
                  <g transform={`translate(${px(r.lon)+42},${py(r.lat)-40})`}>
                    <text fontFamily="JetBrains Mono,monospace" fontSize="11" fill="#eaf1ff" fontWeight="600">{r.mapName || r.name}</text>
                    <text fontFamily="JetBrains Mono,monospace" fontSize="10" fill="var(--coral)" y="14">{r.ret} · {r.lead}</text>
                  </g>
                </g>
              );
            })}
          </svg>
          <div style={{ position:"absolute", top:24, right:36, fontFamily:"var(--mono)", fontSize:10, color:"rgba(0,212,255,0.45)", letterSpacing:"0.14em" }}>
            FIG. 02 — REGIONAL COMMITTEES · EQUIRECT PROJ
          </div>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:0, marginTop:40, borderTop:"1px solid rgba(0,212,255,0.15)" }}>
          {REGIONS.map((r,i) => (
            <div key={r.id} style={{
              padding:"24px 20px",
              borderRight:(i%3!==2)?"1px solid rgba(0,212,255,0.12)":"none",
              borderBottom:i<3?"1px solid rgba(0,212,255,0.12)":"none",
            }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline" }}>
                <h4 className="h-serif" style={{ color:"#eaf1ff", margin:0, fontSize:18 }}>{r.name}</h4>
                <span className="mono" style={{ color:"var(--coral)", fontSize:12 }}>{r.ret}</span>

          <h2 className="display" style={{ fontSize:"clamp(48px,6vw,96px)", margin:"16px 0 24px", color:"var(--paper-2)" }}>
            Read the <em style={{ color:"var(--coral)" }}>IPS.</em>
          </h2>
          <p className="serif" style={{ fontSize:18, fontStyle:"italic", color:"rgba(255,255,255,0.85)", maxWidth:600, margin:"0 auto 36px" }}>
            The IPS is the Fund's governing document for portfolio construction, permissible investments, risk limits, decision-making, and monitoring.
          </p>
          <a href="assets/IBEC_IPS.pdf" target="_blank" rel="noopener" className="btn btn-coral">Download IPS (PDF) <span className="arr">→</span></a>
        </div>
      </section>

    </div>
  );
}

// ── App shell ─────────────────────────────────────────────
function App() {
  const [route, setRoute] = React.useState(() => {
    const hash = window.location.hash.replace("#/","");
    return ["home","investment"].includes(hash) ? hash : "home";
  });

  const go = r => {
    setRoute(r);
    window.location.hash = `/${r}`;
    window.scrollTo({ top:0, behavior:"instant" });
  };

  window.__wibecGo = go;

  React.useEffect(() => {
    const onHash = () => {
      const h = window.location.hash.replace("#/","");
      if (["home","investment"].includes(h)) {
        setRoute(h);
        window.scrollTo({ top:0, behavior:"instant" });
      }
    };
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);

  let page;
  if (route === "investment") page = <CommitteePage/>;
  else                        page = <Home go={go}/>;

  return (
    <>
      {/* Nav: shared header.js (same markup/CSS as static pages) */}
      <div style={{ paddingTop: 88 }}>
        <TickerBar/>
        {page}
      </div>
      <Footer go={go}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
